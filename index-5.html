<script>
const EXPIRY_TIME = 60 * 60 * 1000; // 1 hour in ms

function getVisited() {
  return JSON.parse(localStorage.getItem('visitedLinks') || '{}');
}


  

        document.querySelectorAll('.zipper-block').forEach(block => {
    const zipper = block.querySelector('.zipper');
    const label = block.querySelector('.zipper-label');

    if (!zipper || !label) return;

    const href = zipper.dataset.href;

    label.style.cursor = "pointer";

    label.addEventListener('click', () => {
    
  
        window.location.href = href;
    });
    });


  document.querySelectorAll('.zipper').forEach((container) => {
    const image = container.querySelector('.background-image');
    const handle = container.querySelector('.zipper-handle');
    const leftTrack = container.querySelector('.zipper-left');
    const rightTrack = container.querySelector('.zipper-right');
    const href = container.dataset.href;
    const imageSrc = container.dataset.image;

    image.src = imageSrc;

    const containerHeight = container.clientHeight;
    const maxDrag = containerHeight - handle.clientHeight;

    let isDragging = false;
    let startY = 0;
    let hasUnzipped = false;

    function setPosition(y) {
      const clampedY = Math.min(maxDrag, Math.max(0, y));
      const percent = clampedY / maxDrag;

      handle.style.top = clampedY + "px";
      image.style.opacity = (0.6 + 0.2 * percent).toFixed(2);

 /*     container.style.transform = `scale(${1.5 + percent * 0.1})`; */

      const offset = percent * 50;
      leftTrack.style.transform = `translateX(${-3 - offset}px)`;
      rightTrack.style.transform = `translateX(${2 + offset}px)`;

      const trackOpacity = (1 - percent).toFixed(2);
      leftTrack.style.opacity = trackOpacity;
      rightTrack.style.opacity = trackOpacity;
      handle.style.opacity = trackOpacity;
    }

    function triggerUnzip() {
        if (hasUnzipped) {
       
  window.location.href = href;
  return;
}
  hasUnzipped = true;

  let progress = parseFloat(handle.style.top) || 0;
  const step = 3; // pixels per frame
  const speed = 10; // ms delay per frame

  function animate() {
    progress += step;
    setPosition(progress);

    if (progress < maxDrag) {
      setTimeout(animate, speed);
    } else {
      container.classList.add('unzipped');
      window.location.href = href;
    }
  }

  animate();
  
}


    handle.addEventListener('mousedown', (e) => {
      if (hasUnzipped) return;
      isDragging = true;
      startY = e.clientY - handle.offsetTop;
      handle.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging || hasUnzipped) return;
      const newY = e.clientY - startY;
      setPosition(newY);
      if (newY >= maxDrag) {
        isDragging = false;
        triggerUnzip();
      }
    });

    document.addEventListener('mouseup', () => {
      if (!hasUnzipped) {
        isDragging = false;
        handle.style.cursor = 'grab';
      }
    });

    handle.addEventListener('dblclick', (e) => {
      e.preventDefault();
   //   triggerUnzip();
    });

    container.parentElement.addEventListener('click', (e) => {
  triggerUnzip();
});

  });
</script>
