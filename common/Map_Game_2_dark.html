<script>
document.addEventListener('DOMContentLoaded', function () {
  const button = document.querySelector('.info-br');
  if (!button) return;

  let replaced = false;

  function toggleElements() {
    const elements = document.querySelectorAll('.kl, .nl');
    if (elements.length === 0) return;

    if (!replaced) {
      elements.forEach(el => {
        el.innerHTML = el.innerHTML.replace(/;/g, '.<br>');
      });
      replaced = true;
    }

    const isHidden = getComputedStyle(elements[0]).display === 'none';

    elements.forEach(el => {
      el.style.display = isHidden ? 'block' : 'none';
    });

    button.classList.toggle('active');
  }

  button.addEventListener('click', toggleElements);

  document.addEventListener('keydown', function (e) {
    if (e.key.toLowerCase() === 't') {
      toggleElements();
    }
  });
});
</script>

<script>
  const button = document.getElementById("font-switcher");

  // Load saved state (default = 0)
  let state = parseInt(localStorage.getItem("fontState")) || 0;
  let styleTag = null;

  function applyStyle() {
    // Remove existing style first
    const existing = document.getElementById("font-toggle-style");
    if (existing) existing.remove();

    if (state === 1) {
      // MIN
      styleTag = document.createElement("style");
      styleTag.id = "font-toggle-style";
      styleTag.innerHTML = `
        .leaflet-tooltip.reveal-all-tooltip,
        .leaflet-tooltip.selected-tooltip.leaflet-zoom-animated {
          font-size: 9px !important;
          line-height: 8px !important;
          padding: unset !important;
          min-height: auto !important; 
width: 28px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
        }

  .leaflet-tooltip.reveal-all-tooltip:hover,
.leaflet-tooltip.selected-tooltip.leaflet-zoom-animated:hover {
  font-size: 11px !important;
  font-weight: 580;
width: unset;
  white-space: nowrap;
  overflow: unset;
  text-overflow: unset;
        }


      `; /* smallest font */
      document.head.appendChild(styleTag);

    } else if (state === 2) {
      // LARGER
      styleTag = document.createElement("style");
      styleTag.id = "font-toggle-style";
      styleTag.innerHTML = `
        .leaflet-tooltip.reveal-all-tooltip,
        .leaflet-tooltip.selected-tooltip.leaflet-zoom-animated {
          font-size: 10px !important;
          padding: 0.4px 0.4px !important;
        }
      `;
      document.head.appendChild(styleTag);
    }

    // Save state
    localStorage.setItem("fontState", state);
  }

  function toggleFont() {
    state = (state + 1) % 3; // 0 → 1 → 2 → 0
    applyStyle();
  }

  // Button click
  button.addEventListener("click", toggleFont);

  // Keyboard shortcuts
  document.addEventListener("keydown", function (e) {
    const isModifierPressed = e.metaKey || e.ctrlKey || e.altKey;

    // Ctrl/Cmd/Alt + 7
    if (isModifierPressed && e.key === "7") {
      e.preventDefault();
      toggleFont();
    }

    // Press "a" (ignore if typing in inputs)
    if (
      e.key.toLowerCase() === "z" &&
      !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)
    ) {
      toggleFont();
    }
  });

  // Apply saved state on page load
  applyStyle();
</script>

<script>
window.addEventListener('load', function () {
  document.body.addEventListener('pointerdown', function (event) {
    const RADIUS = 20; // Distance in pixels – 19 works good

    const pointerX = event.clientX;
    const pointerY = event.clientY;

    const paths = Array.from(document.querySelectorAll('path'));
    
    paths.forEach(path => {
      const mapRect = map.getContainer().getBoundingClientRect();

  const correctedY = rect.top - mapRect.top;

      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const dx = pointerX - centerX;
      const dy = pointerY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance <= RADIUS) {
        let tooltipId = null;

        if (path.classList.contains('polygon_leaflet')) {
          tooltipId = path.getAttribute('data-river-name');
        } else if (path.hasAttribute('aria-describedby')) {
          tooltipId = path.getAttribute('aria-describedby');
        }

        if (!tooltipId) return;

        const tooltip = document.getElementById(tooltipId);
        if (!tooltip) return;

        const isTooltipVisible = tooltip.style.display === 'block';
        tooltip.style.display = isTooltipVisible ? 'none' : 'block';

        if (isTooltipVisible) {
          path.classList.remove('selected-path');
//          themeStylesheet.setAttribute("href", "theme1.css");

        } else {
          path.classList.add('selected-path');
        }
      }
    });
  });
});

  <script>
    // Utility to get first meaningful text node from a tooltip
    function getFirstTextNode(element) {
      for (const node of element.childNodes) {
        if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
          return node.textContent.trim();
        }
      }
      return '';
    }
  
    // Match and toggle tooltip based on shared text content
    window.addEventListener('load', function () {
      document.body.addEventListener('click', function (event) {
        const path = event.target.closest('path[data-name]');
        if (!path) return;
  
        const featureName = path.getAttribute('data-name');
        if (!featureName) return;
  
        const allTooltips = document.querySelectorAll('.leaflet-tooltip');
        let matchingTooltip = null;
  
        for (const tooltip of allTooltips) {
          const tooltipText = getFirstTextNode(tooltip);
          if (tooltipText === featureName) {
            matchingTooltip = tooltip;
            break;
          }
        }
  
        if (!matchingTooltip) return;
  
        const isVisible = matchingTooltip.style.display === 'block';
        matchingTooltip.style.display = isVisible ? 'none' : 'block';
  
        if (isVisible) {
          path.classList.remove('selected-path');
        } else {
          path.classList.add('selected-path');
        }
      });
    });
  </script>

<script> //REVEAL ALL BUTTON (and loading tooltips at startup)

    let allTooltipsVisible = true;  // Set the default state of the tooltips
    let allTooltipsRevealed = false;

    const tooltips = [];  // Renamed to avoid any conflicts
    let revealedLayers = [];  // Keep track of all added tooltip layers
window.onload = function () {
    if (tooltips.length === 0) {
        for (const river in mapData) {
            const geometry = parseGeometry(mapData[river]);

            if (Array.isArray(geometry)) {
                const centroid = getCollectionCentroid(geometry);
                if (centroid) {
                    const marker = L.marker(centroid, {
                        icon: L.divIcon({ className: 'reveal-all-tooltip-icon', html: '●', iconSize: [1, 1] })
                    }).bindTooltip(river, { permanent: true, className: 'reveal-all-tooltip' }).addTo(map);

                    tooltips.push(marker);
                    revealedLayers.push(marker);  // ✅ Fix: Add to revealedLayers
                }
            } else {
                const layer = addTooltipForGeometry(geometry, river);
                if (layer) {
                    tooltips.push(layer);
                    // Already pushed to revealedLayers inside addTooltipForGeometry
                }
            }
        }
    }

    // ✅ Always hide all tooltips initially
    revealedLayers.forEach(layer => {
        const tooltipElement = layer.getTooltip()?.getElement();
        if (tooltipElement) {
            tooltipElement.style.display = 'none';
        }
    });
};
 
    function getCollectionCentroid(geometries) {
        let latSum = 0, lonSum = 0, count = 0;
        geometries.forEach(geometry => {
            if (geometry.type === 'Point') {
                latSum += geometry.coordinates[0];
                lonSum += geometry.coordinates[1];
                count++;
            } else if (geometry.type === 'LineString' || geometry.type === 'Polygon') {
                geometry.coordinates.forEach(coord => {
                    latSum += coord[0];
                    lonSum += coord[1];
                    count++;
                });
            }
        });

        return count ? [latSum / count, lonSum / count] : null;
    }


    
    // Function to add a tooltip at the best location
    function addTooltipForGeometry(geometry, river) {
        let layer = null;
    
        if (geometry.type === 'Point') {
            layer = L.circleMarker(geometry.coordinates, {
                radius: 4,
                weight: 2,
                fillOpacity: 1,
                className: 'point_leaflet'
            });
        } else if (geometry.type === 'LineString') {
            layer = L.polyline(geometry.coordinates, {
                color: '#60A6C2',
                weight: 3,
                opacity: 1,
                className: 'line_leaflet'
            });
        } else if (geometry.type === 'Polygon') {
            const centroid = getCollectionCentroid([{ type: 'Polygon', coordinates: geometry.coordinates[0] }]); // Outer ring centroid
            if (centroid) {
                layer = L.marker(centroid, {
                    icon: L.divIcon({
                        className: 'reveal-all-tooltip-icon polygon_leaflet',  // Combined class names
                        html: '●',
                        iconSize: [10, 10]
                    })
                });
            }
        }
    
        if (layer) {
            layer.bindTooltip(river, { permanent: true, className: 'reveal-all-tooltip' }).addTo(map);
            revealedLayers.push(layer);
        }
    }
    
    // Click event listener for "reveal-all" button
    document.querySelector('.reveal-all').addEventListener('click', function () {
    allTooltipsVisible = !allTooltipsVisible;
    allTooltipsRevealed = !allTooltipsRevealed;

    revealedLayers.forEach(layer => {
        const tooltipElement = layer.getTooltip().getElement();
        if (tooltipElement) {
            tooltipElement.style.display = allTooltipsVisible ? 'none' : 'block';
        }

        // Fix: Use getTooltip instead of getElement
        const layerElement = layer.getTooltip()?.getElement();
        if (layerElement) {
            layerElement.style.display = allTooltipsVisible ? 'none' : 'block';
        }
    });
});

let currentPopup = null;
let currentPopupLi = null;

function showSidebarPopup(liElement, content) {
    if (!content) return;

    // If popup exists on this element, toggle off
    if (liElement._popup) {
        liElement._popup.remove();
        liElement._popup = null;
        return;
    }

    // Remove any other popups on other elements
    if (currentPopup) {
        currentPopup.remove();
        if (currentPopupLi) currentPopupLi._popup = null;
    }

    const popup = document.createElement('div');
    popup.className = 'sidebar-popup';
    popup.innerHTML = `<div class="safe-nl">${content.replace(/;/g, '.<br>')}</div>`;


    const rect = liElement.getBoundingClientRect();

    popup.style.left = `${rect.left - 270}px`;
    popup.style.top = `${rect.top - 13}px`;

    document.body.appendChild(popup);

    // Track current popup and its element
    currentPopup = popup;
    currentPopupLi = liElement;
    liElement._popup = popup;

 
}

    if (!sidebar || !list) return;

    let items = Array.from(list.querySelectorAll('li'));
    const highlightedItems = items.filter(li => li.classList.contains('highlighted'));
    let currentIndex = highlightedItems.length
        ? items.indexOf(highlightedItems[highlightedItems.length - 1])
        : -1;

    sidebar.setAttribute('tabindex', '0');

    const style = document.createElement('style');
    style.textContent = `
        .map-data-list li.focused {
            background-color: #e0e0e0;
            outline: 2px solid #888;
        }
    `;
    document.head.appendChild(style);

    function updateFocus() {
        items.forEach((li, i) => {
            li.classList.toggle('focused', i === currentIndex);
        });
        if (currentIndex >= 0) {
            items[currentIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    sidebar.addEventListener('keydown', (e) => {
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            currentIndex = (currentIndex + 1) % items.length;
            updateFocus();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            currentIndex = (currentIndex - 1 + items.length) % items.length;
            updateFocus();
        } else if (e.key === 'Enter' && currentIndex >= 0) {
            e.preventDefault();
            items[currentIndex].click();
            showSidebarPopup( items[currentIndex],  items[currentIndex].dataset.info);
           
        }
    });

    // Global key listener for 'Q' to toggle focus on sidebar
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'q') {
            e.preventDefault();
            if (document.activeElement === sidebar) {
                sidebar.blur();
            } else {
                sidebar.focus();
            }
        }
    });

    const observer = new MutationObserver(() => {
        items = Array.from(list.querySelectorAll('li'));
        const highlightedItems = items.filter(li => li.classList.contains('highlighted'));
        if (highlightedItems.length) {
            currentIndex = items.indexOf(highlightedItems[highlightedItems.length - 1]);
        } else {
            currentIndex = -1;
        }
        updateFocus();
    });

    observer.observe(list, { childList: true, subtree: false });

    if (getComputedStyle(sidebar).display !== 'none') {
        sidebar.focus();
        if (currentIndex >= 0) updateFocus();
    }
})();




    function populateTooltips() {
        tooltipsMap.clear();
        document.querySelectorAll('.leaflet-tooltip').forEach(tooltip => {
            const firstLine = getFirstTextNode(tooltip); // Extract only the first line/text node
            tooltipsMap.set(firstLine, tooltip);
        });
    }

    const observer = new MutationObserver(() => {
        populateTooltips(); // Re-populate the map when new tooltips are added
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
    });

    window.addEventListener('load', () => {
  const savedState = localStorage.getItem('sidebarVisible');
  if (savedState === 'true') {
    sidebar.style.display = 'flex';
    if (!sidebarPopulated) {
      populateSidebar();
      sidebarPopulated = true;
    }
  } else {
    sidebar.style.display = 'none';
  }
});
    
</script>

<script>
(function () {
  const movementMap = new WeakMap();
  let activeTooltip = null;

  function isMatchingTooltip(el) {
    return el.className.startsWith("leaflet-tooltip reveal-all-tooltip leaflet-zoom-animated");
  }

  document.addEventListener('pointerdown', function (e) {
    // Check if the clicked element or its ancestor matches the tooltip class
    let el = e.target;
    while (el && el !== document.body) {
      if (isMatchingTooltip(el) && getComputedStyle(el).display !== 'none') {
        activeTooltip = el;
        return;
      }
      el = el.parentElement;
    }
    // If click outside tooltip, clear active
    activeTooltip = null;
  });

  function moveTooltip(tooltip, dx, dy) {
    if (!movementMap.has(tooltip)) {
      movementMap.set(tooltip, { x: 0, y: 0 });
    }

    const current = movementMap.get(tooltip);
    current.x += dx;
    current.y += dy;

    const existingTransform = tooltip.style.transform || '';
    const cleaned = existingTransform.replace(/translate\([^)]*\)/, '').trim();
    tooltip.style.transform = `${cleaned} translate(${current.x}px, ${current.y}px)`.trim();
  }

  window.addEventListener('keydown', function (e) {
    if (!e.shiftKey || !activeTooltip) return;

    const key = e.key.toLowerCase();
    if (!['w', 'a', 's', 'd'].includes(key)) return;

    e.preventDefault();

    switch (key) {
      case 'w': return moveTooltip(activeTooltip, 0, -10);
      case 's': return moveTooltip(activeTooltip, 0, 10);
      case 'a': return moveTooltip(activeTooltip, -10, 0);
      case 'd': return moveTooltip(activeTooltip, 10, 0);
    }
  });
})();
</script>
